# Render Blueprint — auto-configures the backend deployment
# Docs: https://docs.render.com/blueprint-spec
services:
  - type: web
    name: securebank-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: MONGO_URI
        sync: false  # Set manually in Render dashboard (contains password)
      - key: MONGO_DB
        value: securebank
      - key: JWT_SECRET_KEY
        sync: false  # Set manually in Render dashboard
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: "60"
      - key: ALLOWED_ORIGINS
        sync: false  # Set to your Vercel URL after frontend deploy
      - key: PYTHON_VERSION
        value: "3.11.6"
